<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>сatsby.studios</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="icon" type="image/x-icon" href="img/cs.png">
    <link href="index.scss" rel="stylesheet" />
  </head>
  <body style="background-image: url(img/cool-bg.jpg); background-size: cover">
    <nav class="navbar bg-body-tertiary" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img
            src="img/cs.png"
            alt="Logo"
            width="28"
            height="28"
            class="d-inline-block align-text-top"
          />
          catsby.studios
        </a>
      </div>
    </nav>
    <div
      class="card mb-3"
      data-bs-theme="dark"
      style="
        max-width: 600px;
        background: transparent;
        backdrop-filter: blur(10px);
        margin: 19px;
      "
    >
      <div class="row g-0">
        <div class="col-md-4">
          <img src="img/unbro.png" class="img-fluid rounded-start" alt="..." />
        </div>
        <div class="col-md-8">
          <div class="card-body">
            <h5 class="card-title">невыпущенные треки</h5>
            <p class="card-text">
              нерелизнутые треки в хорошем качестве (.wav и .flac)
            </p>
            <a href="unrealease/index.html">
              <button
                type="button"
                style="margin-bottom: 10px; margin-top: 5px"
                class="btn btn-outline-light"
              >
                перейти →
              </button>
            </a>
            <input
              type="checkbox"
              class="btn-check"
              id="btn-check-5"
              checked
              autocomplete="off"
            />
            <input
              type="checkbox"
              class="btn-check"
              id="btn-check"
              autocomplete="off"
            />
            <label
              style="
                font-size: 25px;
                padding-bottom: 0%;
                padding-top: 0%;
                margin-bottom: 5px;
              "
              class="btn btn-outline-danger"
              for="btn-check"
              >♥</label
            >
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
