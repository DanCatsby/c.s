<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="index.scss" rel="stylesheet" />
  </head>
  <body style="background-image: url(img/cool-bg.jpg); background-size: cover">
    <nav class="navbar bg-body-tertiary" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img
            src="img/cs.png"
            alt="Logo"
            width="28"
            height="28"
            class="d-inline-block align-text-top"
          />
          catsby.studios
        </a>
      </div>
    </nav>
    <div
      class="card mb-3"
      data-bs-theme="dark"
      style="
        max-width: 600px;
        background: transparent;
        backdrop-filter: blur(10px);
        margin: 19px;
      "
    >
      <div class="row g-0">
        <div class="col-md-4">
          <img
            src="img/inside-my-cat.jpg"
            class="img-fluid rounded-start"
            alt="..."
          />
        </div>
        <div class="col-md-8">
          <div class="card-body">
            <h5 class="card-title">inside my cat</h5>
            <p class="card-text">first album | released on june, 19, 2025</p>
            <button
              type="button"
              style="margin-bottom: 10px; margin-top: 5px"
              class="btn btn-outline-light"
            >
              listen here
            </button>
            <input
              type="checkbox"
              class="btn-check"
              id="btn-check-5"
              checked
              autocomplete="off"
            />
            <input
              type="checkbox"
              class="btn-check"
              id="btn-check"
              autocomplete="off"
            />
            <label
              style="
                font-size: 25px;
                padding-bottom: 0%;
                padding-top: 0%;
                margin-bottom: 5px;
              "
              class="btn btn-outline-danger"
              for="btn-check"
              >♥</label
            >

            <div style="margin-top: 15px">
              <a
                style="padding-right: 11px"
                href="https://music.yandex.ru/album/40612387"
              >
                <img
                  src="https://yastatic.net/s3/doc-binary/src/mediaservices/yandex_music_icon_ru_whitebg.svg"
                  class="platform-logo"
                  alt="лого"
                  width="30px"
                  height="30px"
                />
              </a>
              <a
                style="padding-right: 11px"
                href="https://music.yandex.ru/album/40612387"
              >
                <img
                  src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/VK_%D0%9C%D1%83%D0%B7%D1%8B%D0%BA%D0%B0.png/960px-VK_%D0%9C%D1%83%D0%B7%D1%8B%D0%BA%D0%B0.png"
                  class="platform-logo"
                  alt="лого"
                  width="30px"
                  height="30px"
                />
              </a>
              <a
                style="padding-right: 11px"
                href="https://music.yandex.ru/album/40612387"
              >
                <img
                  src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Apple_Music_Icon.svg/1280px-Apple_Music_Icon.svg.png?_=20220528070541"
                  class="platform-logo"
                  alt="лого"
                  width="30px"
                  height="30px"
                />
              </a>
              <a
                style="padding-right: 11px"
                href="https://music.yandex.ru/album/40612387"
              >
                <img
                  src="img/Zvuk_2022_White.png"
                  class="platform-logo"
                  alt="лого"
                  width="30px"
                  height="30px"
                />
              </a>
              <a
                style="padding-right: 11px"
                href="https://music.yandex.ru/album/40612387"
              >
                <img
                  src="img/OK orange compact-512.png"
                  class="platform-logo"
                  alt="лого"
                  width="30px"
                  height="30px"
                />
              </a>
              <a
                style="padding-right: 11px"
                href="https://music.yandex.ru/album/40612387"
              >
                <img
                  src="img/mts.png"
                  class="platform-logo"
                  alt="лого"
                  width="30px"
                  height="30px"
                />
              </a>
              <a href="https://music.yandex.ru/album/40612387">
                <img
                  src="img/lightaudio.ru.ico"
                  class="platform-logo"
                  alt="лого"
                  width="30px"
                  height="30px"
                />
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div
      class="card mb-3"
      data-bs-theme="dark"
      style="
        max-width: 600px;
        max-height: 300px;
        background: transparent;
        backdrop-filter: blur(10px);
        margin: 19px;
      "
    >
      <div class="row g-0">
        <div class="col-md-4">
          <img src="img/unbro.png" class="img-fluid rounded-start" alt="..." />
        </div>
        <div class="col-md-8">
          <div class="card-body">
            <h5 class="card-title">невыпущенные треки</h5>
            <p class="card-text">
              нерелизнутые треки в хорошем качестве (.wav и .flac)
            </p>
            <a href="unrealease/index.html">
              <button
                type="button"
                style="margin-bottom: 10px; margin-top: 5px"
                class="btn btn-outline-light"
              >
                перейти →
              </button>
            </a>
            <input
              type="checkbox"
              class="btn-check"
              id="btn-check-5"
              checked
              autocomplete="off"
            />
            <input
              type="checkbox"
              class="btn-check"
              id="btn-check"
              autocomplete="off"
            />
            <label
              style="
                font-size: 25px;
                padding-bottom: 0%;
                padding-top: 0%;
                margin-bottom: 5px;
              "
              class="btn btn-outline-danger"
              for="btn-check"
              >♥</label
            >
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
